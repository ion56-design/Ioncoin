<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Ioncoin Clicker </title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #1a1a2e 0%, #0f1219 100%);
      color: #fff;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #ui { text-align: center; margin-bottom: 10px; }
    .balance-value { font-size: 3.5rem; font-weight: 700; color: #4ecca3; text-shadow: 0 0 20px rgba(78,204,163,.35); margin: 10px 0; }
    #coin-container {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: transform .1s cubic-bezier(.175,.885,.32,1.275);
      background: transparent;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #coin-container:active { transform: scale(.92); }
    #coin-container img { width: 100%; height: 100%; object-fit: contain; display: block; }
    #coin-container:focus { outline: none; }
    #coin-container:focus-visible { outline: none; box-shadow: none; }
    .nav-bar { display:flex; gap:12px; margin:0 0 16px 0; align-items:center; }
    .nav-btn { padding:10px 14px; background: rgba(78,204,163,.22); color: #fff; border:1px solid rgba(78,204,163,.5); border-radius:10px; cursor:pointer; }
    #shop, #inventory-panel {
      margin-top:20px;
      background: rgba(255,255,255,.05);
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      width:320px;
      backdrop-filter: blur(8px);
    }
    .item { display:flex; align-items:center; justify-content:space-between; padding:12px; border-radius:12px; background: rgba(0,0,0,.15); margin:6px 0; }
    .item-name { font-weight:700; }
    .upgrade-btn { padding:10px 12px; background:#4ecca3; border:none; border-radius:8px; color:#10121a; font-weight:700; cursor:pointer; }
    .upgrade-btn:disabled { background:#34495e; opacity:.6; cursor:not-allowed; }
    .info { font-size:.85rem; opacity:.7; text-align:center; margin-top:6px; }
    .plus-one {
      position: absolute;
      color: #4ecca3;
      font-weight: 800;
      font-size: 28px;
      pointer-events: none;
      animation: float-up .8s ease-out forwards;
      z-index: 100;
    }
    @keyframes float-up { 0% { opacity:1; transform: translateY(0); } 100% { opacity:0; transform: translateY(-120px); } }
    .shop-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .close-shop { background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer; }
    .item-img { width:40px; height:40px; object-fit:cover; vertical-align:middle; border-radius:6px; }
  </style>
</head>
<body>

  <div id="ui">
    <div style="opacity:.75;">Баланс Ioncoin</div>
    <div class="balance-value" id="balance">0</div>
    <div style="font-size:.9rem;color:#4ecca3;">Сила тапа: <span id="click-power">1</span> • Множитель: x<span id="multiplier-value">1</span></div>
  </div>

  <div class="nav-bar">
    <button id="btn-shop" class="nav-btn">Магазин</button>
    <button id="btn-inventory" class="nav-btn">Инвентарь</button>
  </div>

  <!-- Кнопка монеты (заменён путь на photo_5289875249144993768_y.png24) -->
  <div id="coin-container" role="button" tabindex="0" aria-label="Заработать IonCoin">
    <!-- INSERT COIN IMAGE: photo_5289875249144993768_y.png24 -->
    <img id="coin-image" src="photo_5289875249144993768_y.png24" alt="IonCoin">
  </div>

  <!-- Магазин (по-умолчанию скрыт) -->
  <div id="shop" style="display:none;">
    <div class="shop-header">
      <strong>Магазин</strong>
      <button id="close-shop" class="close-shop" aria-label="Закрыть магазин">✖</button>
    </div>

    <!-- Lamborghini: ваш файл -->
    <div class="item" id="item-lambo" style="display:flex; align-items:center; gap:12px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <!-- INSERT LAMBORGHINI IMAGE: photo_5292127048958677180_y.jpg -->
        <img src="photo_5292127048958677180_y.jpg" alt="Lamborghini" class="item-img">
        <span class="item-name">Lamborghini</span>
      </div>
      <div>
        <div class="info" style="margin:0 0 6px 0;">Цена: 100000 IonCoin</div>
        <button id="buy-lambo" class="upgrade-btn">Купить Lamborghini</button>
      </div>
    </div>

    <!-- Удвоение клика: ваш файл усилителя -->
    <div class="item" id="item-x2" style="display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:8px;">
        <!-- INSERT X2 IMAGE: photo_5292127048958677181_y.jpg -->
        <img src="photo_5292127048958677181_y.jpg" alt="Удвоение клика" class="item-img">
        <span class="item-name">Удвоение клика</span>
      </div>
      <div>
        <div class="info" style="margin:0 0 6px 0;">Цена: 500 IonCoin</div>
        <button id="buy-x2" class="upgrade-btn">Купить</button>
      </div>
    </div>

    <div class="info" style="margin-top:10px;">Инвентарь обновится после покупки.</div>
  </div>

  <!-- Инвентарь -->
  <div id="inventory-panel" style="display:none;">
    <div class="shop-header" style="margin-bottom:8px;">
      <strong>Инвентарь</strong>
    </div>
    <div id="inventory-list" class="info" style="text-align:left; min-height:20px;">Инвентарь пуст.</div>
  </div>

  <script>
    const balanceEl = document.getElementById('balance');
    const clickPowerEl = document.getElementById('click-power');
    const multiplierEl = document.getElementById('multiplier-value');
    const btnShop = document.getElementById('btn-shop');
    const btnInventory = document.getElementById('btn-inventory');
    const shopPanel = document.getElementById('shop');
    const inventoryPanel = document.getElementById('inventory-panel');
    const inventoryListEl = document.getElementById('inventory-list');
    const closeShopBtn = document.getElementById('close-shop');
    const buyLamboBtn = document.getElementById('buy-lambo');
    const buyX2Btn = document.getElementById('buy-x2');
    const coinContainer = document.getElementById('coin-container');

    // Состояние (локальное хранилище)
    let balance = parseInt(localStorage.getItem('ion_balance')) || 0;
    let clickPower = parseInt(localStorage.getItem('ion_power')) || 1;
    let clickMultiplier = parseInt(localStorage.getItem('ion_multiplier')) || 1;
    let inventory = JSON.parse(localStorage.getItem('ion_inventory') || '[]');

    const X2_PRICE = 500;
    const LAMBO_PRICE = 100000;

    function saveState() {
      localStorage.setItem('ion_balance', balance);
      localStorage.setItem('ion_power', clickPower);
      localStorage.setItem('ion_multiplier', clickMultiplier);
      localStorage.setItem('ion_inventory', JSON.stringify(inventory));
    }

    function renderInventory() {
      if (!inventoryListEl) return;
      if (inventory.length === 0) {
        inventoryListEl.textContent = 'Инвентарь пуст.';
        return;
      }
      const html = inventory.map(it => {
        if (it === 'lambo') {
          return '<div style="display:flex; align-items:center; gap:6px;"><img src="photo_5292127048958677180_y.jpg" alt="Lamborghini" style="width:20px;height:20px;object-fit:cover;border-radius:4px;"> Lamborghini</div>';
        }
        if (it === 'x2') {
          return '<div style="display:flex; align-items:center; gap:6px;"><img src="photo_5292127048958677181_y.jpg" alt="Удвоение клика" style="width:20px;height:20px;object-fit:cover;border-radius:4px;"> Удвоение клика</div>';
        }
        return XXXINLINECODEXXX0XXXINLINECODEXXX;
      }).map(s => XXXINLINECODEXXX1XXXINLINECODEXXX).join('');
      inventoryListEl.innerHTML = html;
    }

    function render() {
      balanceEl.textContent = balance;
      clickPowerEl.textContent = clickPower;
      multiplierEl.textContent = clickMultiplier;
      if (buyLamboBtn) buyLamboBtn.disabled = balance < LAMBO_PRICE || inventory.includes('lambo');
      if (buyX2Btn) buyX2Btn.disabled = balance < X2_PRICE || inventory.includes('x2');
      renderInventory();
    }

    // Навигация
    btnShop.addEventListener('click', () => { shopPanel.style.display = 'block'; inventoryPanel.style.display = 'none'; });
    closeShopBtn.addEventListener('click', () => { shopPanel.style.display = 'none'; });
    btnInventory.addEventListener('click', () => { inventoryPanel.style.display = 'block'; shopPanel.style.display = 'none'; });

    // Покупки
    buyLamboBtn?.addEventListener('click', () => {
      if (inventory.includes('lambo')) { alert('У вас уже есть Lamborghini.'); return; }
      if (balance >= LAMBO_PRICE) {
        balance -= LAMBO_PRICE;
        inventory.push('lambo');
        saveState();
        render();
      } else alert('Недостаточно IonCoin.');
    });

    buyX2Btn?.addEventListener('click', () => {
      if (inventory.includes('x2')) { alert('Удвоитель уже активирован.'); return; }
      if (balance >= X2_PRICE) {
        balance -= X2_PRICE;
        inventory.push('x2');
        clickMultiplier *= 2;
        saveState();
        render();
      } else alert('Недостаточно IonCoin.');
    });

    // Клик по монете — начисление
    coinContainer.addEventListener('click', () => {
      const gain = Math.max(1, Math.floor(clickPower * clickMultiplier));
      balance += gain;

      const el = document.createElement('span');
      el.className = 'plus-one';
      el.textContent = '+' + gain;
      coinContainer.appendChild(el);
      setTimeout(() => el.remove(), 800);

      saveState();
      render();

      // снимаем фокус, чтобы не было обводки
      if (typeof coinContainer.blur === 'function') coinContainer.blur();
    });

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => { render(); });

    // Закрытие магазина по Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && shopPanel.style.display === 'block') shopPanel.style.display = 'none';
    });
  </script>
</body>
</html>
