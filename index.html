<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Ioncoin Clicker PRO</title>
  <style>
    /* --- Фоновые эффекты --- */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(120deg,#08121b 0%, #0f1724 50%, #071126 100%);
      color: #fff;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 420px; height: 420px; left: -80px; top: -60px; background: radial-gradient(circle, #2ee6b8, #1e8cff); animation: float1 18s ease-in-out infinite; }
    .b2 { width: 520px; height: 520px; right: -120px; top: 20px; background: radial-gradient(circle, #ffd76b, #ff7aa3); animation: float2 22s ease-in-out infinite; }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,18px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-28px,-18px)} }

    .bg-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(3,6,12,0.25), rgba(2,6,10,0.45)); z-index: 1; pointer-events: none; }

    /* --- Основной интерфейс --- */
    #app { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

    #ui { text-align: center; margin-bottom: 12px; user-select: none; }
    .balance-value { font-size: 3.2rem; font-weight: 700; color: #d9ffbf; text-shadow: 0 6px 30px rgba(0,0,0,0.6); margin: 8px 0; }
    
    #coin-container {
      position: relative;
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: transform .09s cubic-bezier(.175,.885,.32,1.275);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    #coin-container:active { transform: scale(.92); }
    
    /* УБИРАЕМ ЧЕРНЫЙ ФОН JPG КАРТИНКИ */
    #coin-image { 
      width: 90%; height: 90%; 
      object-fit: contain; 
      mix-blend-mode: screen; /* Скрывает черный цвет на JPG */
    }

    /* СТИЛЬНЫЕ КНОПКИ */
        .nav-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .nav-btn {
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    #shop, #inventory-panel {
      background: rgba(15, 23, 36, 0.95);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 360px;
      max-width: 90%;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: none;
    }

    .item { 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); margin: 10px 0; 
    }

    .upgrade-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #4ecca3 0%, #45b293 100%);
      border: none;
      border-radius: 10px;
      color: #10121a;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(78, 204, 163, 0.2);
    }
    .upgrade-btn:disabled { background: #34495e; color: #7f8c8d; opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    .upgrade-btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }

    /* Анимация клика */
    .plus-one {
      position: absolute;
      color: #e6fff0;
      font-weight: 800;
      font-size: 24px;
      pointer-events: none;
      animation: float-up .85s ease-out forwards;
      z-index: 100;
    }
    .coin-letter { color: #FFD700; margin-left: 5px; }
    @keyframes float-up { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-120px); } }

    .bar-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-top: 5px; }
    .bar-fill { height: 100%; width: 0%; background: #ffd76b; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-overlay"></div>
  <div id="app">
    <div id="ui">
      <div style="opacity:.78;">Баланс Ioncoin</div>
      <div class="balance-value" id="balance">0</div>
      <div style="font-size:.9rem;color:#bfffd9;">Сила тапа: <span id="click-power">1</span> • x<span id="multiplier-value">1</span></div>
    </div>

    <div class="nav-bar">
      <button id="btn-shop" class="nav-btn">Магазин</button>
      <button id="btn-inventory" class="nav-btn">Инвентарь</button>
    </div>

    <div id="coin-container">
      <img id="coin-image" src="photo_5289875249144993768_y.jpg" alt="IonCoin">
    </div>

    <!-- МАГАЗИН -->
    <div id="shop">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <strong>Магазин</strong>
        <button id="close-shop" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;">✖</button>
      </div>

      <div class="item">
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="photo_5292127048958677181_y.jpg" style="width:40px;height:40px;border-radius:6px;mix-blend-mode: screen;">
          <div>
            <div style="font-weight:700;">Удвоение x2</div>
            <div id="x2-price" style="font-size:0.8rem; opacity:.7;">Цена: 500</div>
          </div>
        </div>
        <button id="buy-x2" class="upgrade-btn">Купить</button>
      </div>

      <div class="item" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="font-weight:700;">Гиперклик (x100)</div>
          <button id="buy-hyper" class="upgrade-btn">10 000 IC</button>
        </div>
        <div class="bar-wrap"><div id="hyper-bar" class="bar-fill"></div></div>
        <div id="hyper-status" style="font-size:0.75rem; text-align:center; margin-top:5px;">Готов</div>
      </div>

      <div class="item">
        <div style="font-weight:700;">Lamborghini NFT</div>
        <button id="buy-lambo" class="upgrade-btn">100 000 IC</button>
      </div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div id="inventory-panel">
      <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
        <strong>Инвентарь</strong>
        <button id="close-inv" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;">✖</button>
      </div>
      <div id="inventory-list" style="font-size:0.9rem; opacity:0.8;"></div>
    </div>
  </div>

  <script>
    // --- Состояние (Твои оригинальные ключи) ---
    let balance = parseInt(localStorage.getItem('ion_balance')) || 0;
    let clickPower = parseInt(localStorage.getItem('ion_power')) || 1;
    let inventory = JSON.parse(localStorage.getItem('ion_inventory') || '[]');
    let x2Level = parseInt(localStorage.getItem('ion_x2_level')) || 0;
    let hyperExpires = parseInt(localStorage.getItem('ion_hyper_expires')) || 0;
    let hyperLastBuy = parseInt(localStorage.getItem('ion_hyper_last_buy')) || 0;

    function save() {
      localStorage.setItem('ion_balance', balance);
      localStorage.setItem('ion_power', clickPower);
      localStorage.setItem('ion_inventory', JSON.stringify(inventory));
      localStorage.setItem('ion_x2_level', x2Level);
      localStorage.setItem('ion_hyper_expires', hyperExpires);
      localStorage.setItem('ion_hyper_last_buy', hyperLastBuy);
    }

    function render() {
      const now = Date.now();
      document.getElementById('balance').textContent = balance.toLocaleString();
      document.getElementById('click-power').textContent = clickPower;
      const mult = Math.pow(2, x2Level);
      document.getElementById('multiplier-value').textContent = mult;

      // Кнопка x2
      const x2Price = 500 * (x2Level + 1);
      const buyX2Btn = document.getElementById('buy-x2');
      if (x2Level >= 4) {
        buyX2Btn.textContent = "MAX";
        buyX2Btn.disabled = true;
        document.getElementById('x2-price').textContent = "Максимум";
      } else {
        document.getElementById('x2-price').textContent = `Цена: ${x2Price} IC`;
        buyX2Btn.disabled = balance < x2Price;
      }

      // Гиперклик
      const hyperActive = hyperExpires > now;
      const cooldown = Math.max(0, (hyperLastBuy + 300000) - now);
      const hBtn = document.getElementById('buy-hyper');
      const hBar = document.getElementById('hyper-bar');
      const hStatus = document.getElementById('hyper-status');

      if (hyperActive) {
        hBtn.disabled = true;
        hStatus.textContent = "АКТИВЕН";
        hBar.style.width = ((hyperExpires - now) / 60000 * 100) + "%";
      } else if (cooldown > 0) {
        hBtn.disabled = true;
        hStatus.textContent = "ПЕРЕЗАРЯДКА";
        hBar.style.width = (100 - (cooldown / 300000 * 100)) + "%";
      } else {
        hBtn.disabled = balance < 10000;
        hStatus.textContent = "Готов";
        hBar.style.width = "0%";
      }

      // Ламба
      document.getElementById('buy-lambo').disabled = balance < 100000 || inventory.includes('lambo');
      if (inventory.includes('lambo')) document.getElementById('buy-lambo'\ 
).textContent = "Куплено";

      // Инвентарь (Починил!)
      let invHtml = "";
      if (inventory.includes('lambo')) invHtml += "<div>🏎 Lamborghini NFT</div>";
      if (x2Level > 0) invHtml += `<div>⚡ Уровень множителя: x${mult}</div>`;
      document.getElementById('inventory-list').innerHTML = invHtml || "Инвентарь пуст";
    }

    // Клики
    document.getElementById('coin-container').onmousedown = (e) => {
      const isHyper = hyperExpires > Date.now();
      const gain = clickPower * Math.pow(2, x2Level) * (isHyper ? 100 : 1);
      balance += gain;

      const plus = document.createElement('div');
      plus.className = 'plus-one';
      plus.innerHTML = `+${gain}<span class="coin-letter">I</span>`;
      plus.style.left = e.clientX + "px";
      plus.style.top = (e.clientY - 20) + "px";
      document.body.appendChild(plus);
      setTimeout(() => plus.remove(), 800);

      save(); render();
    };

    // Покупки
    document.getElementById('buy-x2').onclick = () => {
      const price = 500 * (x2Level + 1);
      if (balance >= price && x2Level < 4) {
        balance -= price; x2Level++; save(); render();
      }
    };
    document.getElementById('buy-hyper').onclick = () => {
      if (balance >= 10000 && Date.now() > hyperLastBuy + 300000) {
        balance -= 10000; hyperExpires = Date.now() + 60000; hyperLastBuy = Date.now(); save(); render();
      }
    };
    document.getElementById('buy-lambo').onclick = () => {
      if (balance >= 100000 && !inventory.includes('lambo')) {
        balance -= 100000; inventory.push('lambo'); save(); render();
      }
    };

    // Панели
    document.getElementById('btn-shop').onclick = () => { document.getElementById('shop').style.display='block'; document.getElementById('inventory-panel').style.display='none'; };
    document.getElementById('btn-inventory').onclick = () => { document.getElementById('inventory-panel').style.display='block'; document.getElementById('shop').style.display='none'; };
    document.getElementById('close-shop').onclick = () => document.getElementById('shop').style.display='none';
    document.getElementById('close-inv').onclick = () => document.getElementById('inventory-panel').style.display='none';

    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
