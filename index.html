<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Ioncoin Clicker PRO</title>
  <style>
    /* --- Фоновые эффекты --- */
    html, body { height: 100%; margin: 0; overflow: hidden; background: #08121b; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(120deg, #08121b 0%, #0f1724 50%, #071126 100%);
      color: #fff;
      user-select: none;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 400px; height: 400px; left: -100px; top: -100px; background: radial-gradient(circle, #2ee6b8, #1e8cff); animation: float 15s infinite; }
    .b2 { width: 500px; height: 500px; right: -150px; bottom: -150px; background: radial-gradient(circle, #ffd76b, #ff7aa3); animation: float 20s infinite reverse; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 20px); }
    }

    /* --- Основной интерфейс --- */
    #app { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

    #ui { text-align: center; margin-bottom: 20px; }
    .balance-value { font-size: 3.5rem; font-weight: 800; color: #d9ffbf; text-shadow: 0 0 20px rgba(217, 255, 191, 0.4); margin: 10px 0; }
    
    /* Контейнер монеты */
    #coin-container {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      -webkit-tap-highlight-color: transparent;
    }
    #coin-container:active { transform: scale(0.92); }
    
    /* Убираем черный фон у монеты */
    #coin-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent !important;
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
    }

    /* Навигация */
    .nav-bar { display: flex; gap: 15px; margin-bottom: 20px; }
    .nav-btn {
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
            color: #fff;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    /* Модальные окна */
    .modal-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 400px;
      background: rgba(13, 20, 32, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(20px);
      display: none;
      z-index: 100;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    
    .upgrade-btn {
      background: #4ecca3;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }
    .upgrade-btn:disabled { background: #34495e; color: #7f8c8d; cursor: not-allowed; }

    /* Анимация +Gain */
    .plus-one {
      position: absolute;
      color: #fff;
      font-weight: 900;
      font-size: 28px;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .coin-letter { color: #FFD700; margin-left: 4px; }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-130px); }
    }

    .bar-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: #ffd76b; transition: width 0.3s; }
    .bar-fill-cool { height: 100%; width: 0%; background: #4e92ff; transition: width 0.3s; }

    .close-btn { text-align: right; cursor: pointer; font-size: 20px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div id="app">
    <div id="ui">
      <div style="opacity:0.7;">БАЛАНС IONCOIN</div>
      <div class="balance-value" id="balance">0</div>
      <div style="color:#bfffd9;">Тап: <span id="tap-power">1</span> | Множитель: x<span id="mult-val">1</span></div>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" onclick="openPanel('shop')">Магазин</button>
      <button class="nav-btn" onclick="openPanel('inventory')">Инвентарь</button>
    </div>

    <div id="coin-container">
      <img id="coin-image" src="photo_5289875249144993768_y.png" alt="Coin">
    </div>

    <!-- МАГАЗИН -->
    <div id="shop" class="modal-panel">
      <div class="close-btn" onclick="closeAll()">✖</div>
      <h2 style="margin-top:0;">Магазин</h2>
      
      <div class="item">
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="photo_5292127048958677181_y.png" class="item-img">
          <div>
            <div style="font-weight:700;">Множитель x2</div>
            <div id="x2-price" style="font-size:0.8rem; opacity:0.6;">Цена: 500</div>
          </div>
        </div>
        <button id="buy-x2" class="upgrade-btn" onclick="buyX2()">Купить</button>
      </div>

      <div class="item" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; align-items:center; gap:10px;">
            <img src="photo_5292127048958677181_y.png" class="item-img">
            <div style="font-weight:700;">Гиперклик (x100)</div>
          </div>
          <button id="buy-hyper" class="upgrade-btn" onclick="buyHyper()">10 000</button>
        </div>
        <div class="bar-wrap"><div id="hyper-bar" class="bar-fill"></div></div>
        <div id="hyper-status" style="font-size:0.7rem; text-align:center; margin-top:5px;">Готов</div>
      </div>

      <div class="item">
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="photo_5292127048958677180_y.png" class="item-img">
          <div style="font-weight:700;">Lamborghini NFT</div>
        </div>
        <button id="buy-lambo" class="upgrade-btn" onclick="buyLambo()">100 000</button>
      </div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div id="inventory" class="modal-panel">
      <div class="close-btn" onclick="closeAll()">✖</div>
      <h2 style="margin-top:0;">Инвентарь</h2>
      <div id="inv-list"></div>
    </div>
  </div>

  <script>
    // --- Состояние ---
    let state = {
      balance: parseInt(localStorage.getItem('ion_bal')) || 0,
      power: 1,
      x2Level: parseInt(localStorage.getItem('ion_x2')) || 0,
      inventory: JSON.parse(localStorage.getItem('ion_inv')) || [],
      hyperExpires: parseInt(localStorage.getItem('ion_hyp_exp')) || 0,
      hyperCooldown: parseInt(localStorage.getItem('ion_hyp_cool')) || 0
    };

    const HYPER_DUR = 60000; 
    const HYPER_WAIT = 300000;

    function save() {
      localStorage.setItem('ion_bal', state.balance);
      localStorage.setItem('ion_x2', state.x2Level);
      localStorage.setItem('ion_inv', JSON.stringify(state.inventory));
      localStorage.setItem('ion_hyp_exp', state.hyperExpires);
      localStorage.setItem('ion_hyp_cool', state.hyperCooldown);
    }

    // --- Обновление экрана ---
    function updateUI() {
      const now = Date.now();
      document.getElementById('balance').textContent = Math.floor(state.balance).toLocaleString();
      document.getElementById('tap-power').textContent = state.power;
      
      const mult = Math.pow(2, state.x2Level);
      document.getElementById('mult-val').textContent = mult;

      // Кнопка x2
      const x2Price = 500 * (state.x2Level + 1);
      const x2Btn = document.getElementById('buy-x2');
      if (state.x2Level >= 4) {
        x2Btn.disabled = true; x2Btn.textContent = "MAX";
        document.getElementById('x2-price').textContent = "Максимум";
      } else {
        x2Btn.disabled = state.balance < x2Price;
        document.getElementById('x2-price').textContent = `Цена: ${x2Price} IC`;
      }

      // Гиперклик
      const hyperActive = state.hyperExpires > now;
      const cooldownLeft = Math.max(0, state.hyperCooldown - now);
      const hBtn = document.getElementById('buy-hyper');
      const hBar = document.getElementById('hyper-bar');
      const hStatus = document.getElementById('hyper-status');

      if (hyperActive) {
        hBtn.disabled = true;
        hStatus.textContent = "АКТИВНО";
        hBar.style.width = ((state.hyperExpires - now) / HYPER_DUR * 100) + "%";
        hBar.className = "bar-fill";
      } else if (cooldownLeft > 0) {
        hBtn.disabled = true;
        hStatus.textContent = "ПЕРЕЗАРЯДКА";
        hBar.style.width = (100 - (cooldownLeft / HYPER_WAIT * 100)) + "%";
        hBar.className = "bar-fill-cool";
      } else {
        hBtn.disabled = state.balance < 10000;
        hStatus.textContent = "ГОТОВ";
        hBar.style.width = "0%";
      }

      // Ламба
      const lBtn = document.getElementById('buy-lambo');
      if (state.inventory.includes('lambo')) {
        lBtn.disabled = true; lBtn.textContent = "КУПЛЕНО";
      } else {
        lBtn.disabled = state.balance < 100000;
      }

      // Инвентарь
      let invHtm
      l = "";
      if (state.inventory.includes('lambo')) invHtml += "<div>🏎 Lamborghini NFT</div>";
      if (state.x2Level > 0) invHtml += `<div>⚡ Множитель Тапа: x${mult}</div>`;
      document.getElementById('inv-list').innerHTML = invHtml || "Инвентарь пуст";
    }

    // --- Клик ---
    document.getElementById('coin-container').onmousedown = (e) => {
      const isHyper = state.hyperExpires > Date.now();
      const gain = state.power * Math.pow(2, state.x2Level) * (isHyper ? 100 : 1);
      state.balance += gain;

      const plus = document.createElement('div');
      plus.className = 'plus-one';
      plus.innerHTML = `+${gain}<span class="coin-letter">I</span>`;
      plus.style.left = e.clientX + "px";
      plus.style.top = (e.clientY - 20) + "px";
      document.body.appendChild(plus);
      setTimeout(() => plus.remove(), 800);

      save(); updateUI();
    };

    // --- Магазин ---
    function buyX2() {
      const price = 500 * (state.x2Level + 1);
      if (state.balance >= price && state.x2Level < 4) {
        state.balance -= price;
        state.x2Level++;
        save(); updateUI();
      }
    }

    function buyHyper() {
      if (state.balance >= 10000 && Date.now() > state.hyperCooldown) {
        state.balance -= 10000;
        state.hyperExpires = Date.now() + HYPER_DUR;
        state.hyperCooldown = Date.now() + HYPER_WAIT + HYPER_DUR;
        save(); updateUI();
      }
    }

    function buyLambo() {
      if (state.balance >= 100000 && !state.inventory.includes('lambo')) {
        state.balance -= 100000;
        state.inventory.push('lambo');
        save(); updateUI();
      }
    }

    // --- Панели ---
    function openPanel(id) {
      closeAll();
      document.getElementById(id).style.display = 'block';
    }
    function closeAll() {
      document.querySelectorAll('.modal-panel').forEach(p => p.style.display = 'none');
    }

    setInterval(updateUI, 1000);
    updateUI();
  </script>
</body>
</html>
