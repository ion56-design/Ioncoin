<!DOCTYPE html>

<html lang="ru">

<head>

<meta charset="utf-8" />

<meta name="viewport" content="width=device-width,initial-scale=1.0" />

<title>Ioncoin Clicker PRO</title>

<style>

/ ---- базовый стиль и оптимизированный фон (переливающийся градиент) ---- /

html,body{height:100%;margin:0;font-family:Inter, "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial;}

body{

background: linear-gradient(120deg,#071020 0%, #081827 50%, #0b1522 100%);

color:#fff;

-webkit-font-smoothing:antialiased;

-moz-osx-font-smoothing:grayscale;

overflow:hidden;

}

/ animated gradient layer (оптимизировано: без тяжелых blur) /

.animated-bg {

position:fixed; inset:0; z-index:0; pointer-events:none;

background: linear-gradient(90deg, rgba(46,230,184,0.08), rgba(255,215,80,0.06), rgba(126,180,255,0.06), rgba(255,122,163,0.05));

background-size: 300% 300%;

animation: gradientShift 12s linear infinite;

mix-blend-mode: screen;

filter: saturate(1.05);

}

@keyframes gradientShift {

0%{background-position:0% 50%}

50%{background-position:100% 50%}

100%{background-position:0% 50%}

}

/ простые декоративные "блоб"-слои без heavy blur /

.blob { position: absolute; border-radius: 50%; pointer-events:none; opacity:0.12; z-index:0; }

.b1{ width:420px; height:420px; left:-60px; top:-40px; background:radial-gradient(circle at 30% 30%, #2ee6b8, transparent 50%); transform:translateZ(0); }

.b2{ width:520px; height:520px; right:-90px; top:10px; background:radial-gradient(circle at 70% 40%, #ffd76b, transparent 50%); transform:translateZ(0); }

.b3{ width:360px; height:360px; left:18%; bottom:-120px; background:radial-gradient(circle at 40% 60%, #7aa7ff, transparent 50%); transform:translateZ(0); }

/ лёгкая анимация трансформаций (GPU friendly) /

.b1,.b2,.b3 { will-change: transform; animation: blobMove 18s ease-in-out infinite; }

.b2{ animation-duration:22s; }

.b3{ animation-duration:20s; }

@keyframes blobMove {

0%{transform: translate3d(0,0,0)}

50%{transform: translate3d(12px,18px,0)}

100%{transform: translate3d(0,0,0)}

}

/ интерфейс (поверх фона) /

#app { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }

.panel { width:360px; max-width:96vw; background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); border-radius:14px; padding:14px; backdrop-filter: blur(4px); box-shadow: 0 6px 24px rgba(0,0,0,0.45); }

#ui { text-align:center; margin-bottom:14px; }

.balance-row { display:inline-flex; align-items:baseline; gap:8px; justify-content:center; }

.balance-value { font-size:2.8rem; font-weight:800; color:#dfffcf; text-shadow:0 6px 26px rgba(0,0,0,0.6); }

/ золотая буква I рядом с общим балансом /

.balance-letter {

font-weight:900;

color:#FFD700;

font-size:1.05rem;

margin-left:8px;

padding:4px 7px;

border-radius:6px;

background: rgba(255,215,0,0.05);

box-shadow: 0 3px 10px rgba(255,215,0,0.03);

display:inline-flex;

align-items:center;

justify-content:center;

}

#coin-container { margin:16px auto 6px; width:130px; height:130px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); box-shadow: 0 10px 28px rgba(0,0,0,0.55); transition:transform .08s; }

#coin-container:active{ transform:scale(.96); }

#coin-container img{ width:86%; height:86%; object-fit:contain; pointer-events:none; }

.nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; }

.nav button { padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.02); color:#eafef0; cursor:pointer; }

/ магазин /

.shop { margin-top:12px; display:none; }

.shop.open { display:block; }

.shop-item { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px; border-radius:10px; margin-bottom:8px; border:1px solid rgba(255,255,255,0.03); background: rgba(255,255,255,0.015); }

.shop-item .meta { text-align:left; }

.shop-item .title { font-weight:700; }

.shop-item .desc { font-size:0.85rem; opacity:0.8; margin-top:2px; }

.shop-item button { padding:6px 10px; border-radius:8px; border:0; background:linear-gradient(180deg,#2ee6b8,#1fbf9a); color:#012; font-weight:700; cursor:pointer; }

.small { font-size:0.85rem; opacity:0.85; }

/ минимальные подсказки /

.footer { margin-top:10px; display:flex; justify-content:space-between; gap:8px; align-items:center; color:rgba(255,255,255,0.7); font-size:0.9rem; }

.float-plus { position:absolute; pointer-events:none; font-weight:700; color:#dfffcf; text-shadow: 0 6px 18px rgba(0,0,0,.6); will-change:transform,opacity; }

</style>

</head>

<body>

<div class="animated-bg" aria-hidden="true"></div>

<div class="blob b1" aria-hidden="true"></div>

<div class="blob b2" aria-hidden="true"></div>

<div class="blob b3" aria-hidden="true"></div>

<div id="app">

<div class="panel" role="application" aria-label="Ioncoin Clicker">

<div id="ui">

<div class="balance-row">

<div id="balance" class="balance-value">0</div>

<div class="balance-letter" aria-hidden="true">I</div>

</div>

<div id="coin-container" title="Click!">

<!-- inline simple SVG coin to avoid external resources -->

<img alt="coin" src='data:image/svg+xml;utf8,

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

<defs>

<radialGradient id="g" cx="30%" cy="30%">

<stop offset="0%" stop-color="%23fff6d6"/>

<stop offset="60%" stop-color="%23ffd76b"/>

<stop offset="100%" stop-color="%23f4b400"/>

</radialGradient>

</defs>

<circle cx="50" cy="50" r="45" fill="url(%23g)" stroke="%23dab24c" stroke-width="4"/>

<text x="50" y="58" font-size="42" font-family="Arial" font-weight="900" text-anchor="middle" fill="%23111">I</text>

</svg>' />

</div>

<div class="nav">

<button id="toggle-shop">Магазин</button>

<button id="reset">Сброс</button>

</div>

<div id="shop" class="shop" aria-hidden="true"></div>

<div class="footer">

<div class="small">Клик: <span id="clickValue">1</span></div>

<div class="small">CPS: <span id="cps">0</span></div>

</div>

</div>

</div>

</div>

<script>

(function () {

// Ключ сохранения

const STORAGE_KEY = 'ioncoin_save_v1';

// GAMestate

const defaultState = {

balance: 0,

baseClick: 1, // базовый клик

multipliersOwned: 0, // количество x2 (каждый = *2)

multipliersManual: 0, // дополнительные fractional multipliers (unused, but left)

autoClickers: 0, // количество автокликеров (каждый даёт 1 CPS)

purchases: {}, // универсальный контейнер для любых покупок

lastSaved: Date.now()

};

let state = loadState();

let dirty = true; // нужно обновить UI

let cachedMultiplier = null; // кэш мультипликатора

let saveTimer = null;

let lastRAF = performance.now();

let accumulatedAuto = 0; // для точного распределения автокликов

let floatingIdCounter = 0;

// shop configuration

const shopItems = [

{

id: 'upgrade_click',

title: 'Увеличить клик',

desc: 'Добавляет +1 к базовому клику',

baseCost: 15,

costFn: (count) => Math.round(15 * Math.pow(1.15, count)),

onBuy: () => { state.baseClick += 1; },

getCount: () => state.purchases.upgrade_click || 0

},

{

id: 'multiplier',

title: 'Удвоитель',

desc: 'Удваивает все клики (каждая покупка ×2)',

baseCost: 100,

costFn: (count) => Math.round(100 * Math.pow(2.2, count)),

onBuy: () => { state.multipliersOwned += 1; },

getCount: () => state.multipliersOwned || 0

},

{

id: 'autoclicker',

title: 'Автокликер',

desc: 'Добавляет 1 CPS (click per second)',

baseCost: 500,

costFn: (count) => Math.round(500 * Math.pow(1.25, count)),

onBuy: () => { state.autoClickers += 1; },

getCount: () => state.autoClickers || 0

}

];

// DOM

const balanceEl = document.getElementById('balance');

const coinContainer = document.getElementById('coin-container');

const shopEl = document.getElementById('shop');

const toggleShopBtn = document.getElementById('toggle-shop');

const resetBtn = document.getElementById('reset');

const clickValueEl = document.getElementById('clickValue');

const cpsEl = document.getElementById('cps');

// Инициализация

function init() {

// Events

coinContainer.addEventListener('click', onCoinClick);

toggleShopBtn.addEventListener('click', () => {

shopEl.classList.toggle('open');

shopEl.setAttribute('aria-hidden', !shopEl.classList.contains('open'));

dirty = true;

});

resetBtn.addEventListener('click', onReset);

document.addEventListener('visibilitychange', onVisibilityChange);

window.addEventListener('beforeunload', () => saveNow());

// render shop once

renderShop();

// RAF loop

requestAnimationFrame(rafLoop);

// Start autosave tick (safety)

setInterval(() => {

// периодическая авто-подсказка: сохраняем каждые 7 секунд если были изменения

if (dirtyRecently) saveDebounced();

}, 7000);

}

// Рендер через RAF, обновляет только когда dirty = true

let dirtyRecently = false;

function rafLoop(now) {

const dt = (now - lastRAF) / 1000;

lastRAF = now;

// precise auto clicks distributed by dt

if (state.autoClickers > 0) {

accumulatedAuto += state.autoClickers dt getCachedClickValue();

if (accumulatedAuto >= 1) {

const toAdd = Math.floor(accumulatedAuto);

state.balance += toAdd;

accumulatedAuto -= toAdd;

dirty = true;

dirtyRecently = true;

saveDebounced();

}

}

if (dirty) {

render();

dirty = false;

dirtyRecently = true;

}

requestAnimationFrame(rafLoop);

}

// Обработчик клика по монете

function onCoinClick(e) {

const delta = getCachedClickValue();

state.balance += delta;

spawnFloat('+' + formatNumber(delta), e.clientX, e.clientY);

dirty = true;

dirtyRecently = true;

saveDebounced();

}

// Возвращает значение клика с учётом кэша мультипликатора

function getCachedClickValue() {

if (cachedMultiplier === null) recalcMultiplier();

return Math.max(0, Math.round(state.baseClick cachedMultiplier 100) / 100);

}

// Пересчитать мультипликатор (тяжёлые вычисления только при покупке)

function recalcMultiplier() {

// базовый множитель = 1 * (2 ^ multipliersOwned)

cachedMultiplier = Math.pow(2, state.multipliersOwned || 0);

}

// Рендер UI

function render() {

balanceEl.textContent = formatNumber(state.balance);

clickValueEl.textContent = formatNumber(getCachedClickValue());

cpsEl.textContent = formatNumber((state.autoClickers * getCachedClickValue()).toFixed(2));

// рендер магазина (динамически обновляем цены/наличие)

if (shopEl.classList.contains('open')) {

renderShop(); // лёгкая операция — DOM пересоздаётся только при открытом магазине

}

}

// Рендер списка магазина

function renderShop() {

const frag = document.createDocumentFragment();

shopItems.forEach(item => {

const count = item.getCount() || 0;

const cost = item.costFn(count);

const eligible = state.balance >= cost;

const div = document.createElement('div');

div.className = 'shop-item';

const meta = document.createElement('div');

meta.className = 'meta';

const title = document.createElement('div');

title.className = 'title';

title.textContent = item.title + (count ? ×${count} : '');

const desc = document.createElement('div');

desc.className = 'desc';

desc.textContent = item.desc;

meta.appendChild(title);

meta.appendChild(desc);

const right = document.createElement('div');

right.style.textAlign = 'right';

const price = document.createElement('div');

price.className = 'small';

price.textContent = formatNumber(cost) + ' I';

const btn = document.createElement('button');

btn.textContent = 'Купить';

btn.disabled = !eligible;

btn.addEventListener('click', () => {

if (state.balance >= cost) {

state.balance -= cost;

// execute item effect

item.onBuy();

// track purchase count for exponential costs if needed

state.purchases[item.id] = (state.purchases[item.id] || 0) + 1;

// recalc cache when upgrades that affect multiplier are bought

if (item.id === 'multiplier') recalcMultiplier();

dirty = true;

dirtyRecently = true;

saveDebounced();

}

});

right.appendChild(price);

right.appendChild(btn);

div.appendChild(meta);

div.appendChild(right);

frag.appendChild(div);

});

// replace children

shopEl.innerHTML = '';

shopEl.appendChild(frag);

}

// Плавающий +х визуальный эффект

function spawnFloat(text, clientX, clientY) {

// compute relative to app

const appRect = document.getElementById('app').getBoundingClientRect();

const x = clientX - appRect.left;

const y = clientY - appRect.top;

const el = document.createElement('div');

el.className = 'float-plus';

el.style.left = (x - 10) + 'px';

el.style.top = (y - 10) + 'px';

el.textContent = text;

el.style.opacity = '1';

el.style.transform = 'translateY(0px) scale(1)';

el.style.transition = 'transform 900ms cubic-bezier(.2,.9,.2,1), opacity 900ms ease-out';

el.style.zIndex = 9999;

el.id = 'float-' + (++floatingIdCounter);

document.getElementById('app').appendChild(el);

requestAnimationFrame(() => {

el.style.transform = 'translateY(-48px) scale(0.9)';

el.style.opacity = '0';

});

setTimeout(() => {

el.remove();

}, 950);

}

// Форматирование чисел (без буквы I; буква отдельным элементом)

function formatNumber(n) {

// handle numbers and numeric strings

const num = Number(n);

if (!isFinite(num)) return '0';

// show integers without decimals, otherwise up to 2 decimals

if (Math.abs(num) >= 1) {

return new Intl.NumberFormat('ru-RU').format(Math.floor(num));

} else {

return num.toFixed(2);

}

}

// Сохранение: троттл/дебаунс

function saveDebounced() {

if (saveTimer) clearTimeout(saveTimer);

saveTimer = setTimeout(() => {

saveNow();

saveTimer = null;

}, 1500); // сохраняем максимум раз в 1.5 сек после последнего изменения

}

function saveNow() {

try {

state.lastSaved = Date.now();

localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

dirtyRecently = false;

} catch (err) {

console.warn('Save failed', err);

}

}

function loadState() {

try {

const raw = localStorage.getItem(STORAGE_KEY);

if (raw) {

const parsed = JSON.parse(raw);

// ensure fields

const s = Object.assign({}, defaultState, parsed);

recalcMultiplier();

return s;

}

} catch (err) {

console.warn('Load failed, using defaults', err);

}

recalcMultiplier();

return Object.assign({}, defaultState);

}

// Сброс

function onReset() {

if (!confirm('Сбросить прогресс? Это действие нельзя отменить.')) return;

state = Object.assign({}, defaultState);

cachedMultiplier = null;

saveNow();

dirty = true;

}

function onVisibilityChange() {

if (document.visibilityState === 'hidden') {

saveNow();

} else {

// при возвращении пересчитать кэш и обновить UI

recalcMultiplier();

dirty = true;

}

}

// старт

init();

// expose for debug (optional, can be removed)

window._ioncoin = {

getState: () => state,

saveNow,

loadState

};

})();

</script>

</body>

</html>
